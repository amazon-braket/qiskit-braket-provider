[tool.ruff]
target-version = "py311"
line-length = 100
preview = true

[tool.ruff.lint]
extend-select = [
    "A",      # flake8-builtins
    "ANN",    # flake8-annotations
    "ARG",    # flake8-unused-arguments
    "ASYNC",  # flake8-async
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    # "D",    # pydocstyle (~450 errors)
    # "EM",   # flake8-errmsg
    "EXE",    # flake8-executable
    "FA",     # flake8-future-annotations
    "FLY",    # flynt
    "FURB",   # refurb
    "I",      # isort
    "ICN",    # flake8-import-conventions
    "ISC",    # flake8-implicit-str-concat
    "LOG",    # flake8-logging
    "N",      # flake8-naming
    "NPY",    # numpy
    "PERF",   # perflint
    "PGH",    # pygrep-hooks
    "PIE",    # flake8-pie
    # "PL",   # pylint (PLW enabled below)
    "PLW",    # pylint warnings
    # "PT",   # flake8-pytest-style
    "PTH",    # flake8-use-pathlib
    "PYI",    # flake8-pyi
    "Q",      # flake8-quotes
    "RET",    # flake8-return
    "RSE",    # flake8-raise
    "RUF",    # ruff-specific
    "SIM",    # flake8-simplify
    # "SLF",  # flake8-self (~41 errors)
    "SLOT",   # flake8-slots
    "TC",     # flake8-type-checking
    "banned-api", # flake8-tidy-imports
    # "TRY",  # tryceratops
    "UP",     # pyupgrade
    "YTT",    # flake8-2020
]
extend-ignore = [
    "error-suffix-on-exception-name",   # QiskitBraketException is public API
    "typing-only-first-party-import",  # imports used at runtime
    "typing-only-third-party-import",  # braket imports used at runtime in type annotations
    "missing-type-args", # missing annotation on *args
    "missing-type-kwargs", # missing annotation on **kwargs
]

[tool.ruff.lint.isort]
known-first-party = ["braket"]

[tool.ruff.lint.flake8-annotations]
suppress-none-returning = true

[tool.mypy]
warn_unused_configs = true
ignore_missing_imports = true
strict_optional = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
